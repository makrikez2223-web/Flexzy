<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎮 SECRET GAMES</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: linear-gradient(135deg, #0a001f, #1a0033, #000000);
      color: #fff;
      font-family: 'Press Start 2P', cursive;
      text-align: center;
      min-height: 100vh;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    h1 {
      font-size: 3.5rem;
      margin-bottom: 50px;
      text-shadow: 
        0 0 20px #ff00ff,
        0 0 40px #ff00ff,
        0 0 60px #00ffff;
      color: #ff00ff;
      letter-spacing: 4px;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 20px #ff00ff; }
      to { text-shadow: 0 0 40px #ff00ff, 0 0 60px #00ffff; }
    }

    .secret-btn {
      background: linear-gradient(#ff00ff, #aa00aa);
      color: white;
      border: 5px solid #fff;
      padding: 30px 80px;
      font-size: 2rem;
      font-family: 'Press Start 2P', cursive;
      cursor: pointer;
      border-radius: 20px;
      margin: 40px auto;
      display: block;
      transition: all 0.4s;
      box-shadow: 0 0 40px #ff00ff;
      text-transform: uppercase;
    }
    .secret-btn:hover {
      background: linear-gradient(#00ffff, #00aaaa);
      color: #000;
      transform: scale(1.15) rotate(2deg);
      box-shadow: 0 0 60px #00ffff;
    }

    .games-grid {
      display: none;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
      max-width: 1000px;
      margin: 50px auto;
    }

    .game-card {
      background: rgba(20, 0, 40, 0.7);
      border: 4px solid #00ffff;
      border-radius: 20px;
      padding: 30px 20px;
      transition: all 0.4s;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
    }
    .game-card:hover {
      transform: translateY(-15px) scale(1.08);
      border-color: #ff00ff;
      box-shadow: 0 0 40px #ff00ff;
    }

    .game-card h3 {
      color: #00ffff;
      font-size: 1.35rem;
      margin: 15px 0;
      text-shadow: 0 0 10px #00ffff;
    }

    .game-container {
      display: none;
      margin: 40px auto;
      max-width: 1100px;
    }
    .active { display: block !important; }

    iframe {
      width: 100%;
      height: 580px;
      border: 6px solid #ffffff;
      border-radius: 15px;
      background: #000;
      box-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
    }

    .buttons {
      margin: 25px 0;
    }
    button {
      background: #ff00ff;
      color: white;
      border: none;
      padding: 16px 32px;
      margin: 10px 8px;
      font-family: 'Press Start 2P', cursive;
      cursor: pointer;
      border-radius: 10px;
      font-size: 1.1rem;
      transition: 0.3s;
    }
    button:hover {
      background: #00ffff;
      color: #000;
      transform: scale(1.05);
    }

    .fullscreen-btn {
      background: #00ff00;
      font-size: 1.3rem;
      padding: 20px 40px;
      font-weight: bold;
    }
    .fullscreen-btn:hover {
      background: #ffff00;
      color: #000;
    }

    .back-btn { 
      background: #444; 
    }
  </style>
</head>
<body>
  <h1>SECRET GAMES</h1>

  <!-- Botón principal SECRET -->
  <button class="secret-btn" onclick="showSecrets()">
    🔒 SECRET
  </button>

  <!-- Lista de juegos secretos -->
  <div class="games-grid" id="secretsMenu">
    <div class="game-card" onclick="playGame('SECRET 1', 'https://slope3unblocked.github.io/')">
      <h3>🚀 SECRET 1</h3>
    </div>
    <div class="game-card" onclick="playGame('SECRET 2', 'https://1v1lol-unblocked.bitbucket.io/')">
      <h3>⚔️ SECRET 2</h3>
    </div>
  </div>

  <!-- Área donde se carga el juego -->
  <div id="gameArea" class="game-container">
    <h2 id="gameTitle" style="margin-bottom: 20px; color: #00ffff; text-shadow: 0 0 15px #00ffff;"></h2>
   
    <iframe id="gameFrame" allowfullscreen></iframe>
   
    <div class="buttons">
      <button onclick="openInAboutBlank()" class="fullscreen-btn">
        🌐 ABRIR EN PANTALLA COMPLETA
      </button>
      <button onclick="backToMenu()" class="back-btn">← VOLVER AL MENÚ</button>
    </div>
  </div>

  <script>
    let currentUrl = '';
    let currentTitle = '';

    function showSecrets() {
      document.querySelector('.secret-btn').style.display = 'none';
      document.getElementById('secretsMenu').style.display = 'grid';
    }

    function playGame(title, url) {
      currentTitle = title;
      currentUrl = url;
     
      document.getElementById('secretsMenu').style.display = 'none';
      document.getElementById('gameArea').classList.add('active');
      document.getElementById('gameTitle').textContent = title;
      document.getElementById('gameFrame').src = url;
    }

    function openInAboutBlank() {
      if (!currentUrl) return;
      
      const newTab = window.open('about:blank', '_blank');
      if (newTab) {
        newTab.document.write(`
          <!DOCTYPE html>
          <html>
          <head>
            <title>${currentTitle}</title>
            <style>
              body, html { margin:0; padding:0; height:100%; overflow:hidden; background:#000; }
              iframe { width:100%; height:100%; border:none; }
            </style>
          </head>
          <body>
            <iframe src="${currentUrl}" allowfullscreen></iframe>
          </body>
          </html>
        `);
        newTab.document.close();
      } else {
        alert("Por favor, permite las ventanas emergentes para abrir en pantalla completa.");
      }
    }

    function backToMenu() {
      document.getElementById('gameFrame').src = '';
      document.getElementById('gameArea').classList.remove('active');
      document.getElementById('secretsMenu').style.display = 'grid';
      currentUrl = '';
      currentTitle = '';
    }
  </script>
</body>
</html>
